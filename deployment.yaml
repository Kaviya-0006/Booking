apiVersion: apps/v1
kind: Deployment
metadata:
  name: hotel-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hotel-app
  template:
    metadata:
      labels:
        app: hotel-app
    spec:
      containers:
      - name: hotel-container
        # REMEMBER: Change 'your-dockerhub-username' to your actual username
        image: kaviya0006/hotel-app:latest 
        ports:
        - containerPort: 9090 # Changed from 8080
---
apiVersion: v1
kind: Service
metadata:
  name: hotel-service
spec:
  type: LoadBalancer
  ports:
  - port: 80           # This is the external port you will visit in your browser
    targetPort: 9090   # This must match the containerPort above
  selector:
    app: hotel-app

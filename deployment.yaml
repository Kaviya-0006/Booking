apiVersion: apps/v1
kind: Deployment
metadata:
  name: hotel-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hotel-app
  template:
    metadata:
      labels:
        app: hotel-app
    spec:
      containers:
      - name: hotel-container
        image: kaviya63690/hotel-app:latest 
        ports:
        - containerPort: 8081  # Updated port
---
apiVersion: v1
kind: Service
metadata:
  name: hotel-service
spec:
  type: LoadBalancer
  ports:
  - port: 80           # You can still use http://localhost:80 in your browser
    targetPort: 8081   # Now correctly routes to the new port 8081
  selector:
    app: hotel-app
